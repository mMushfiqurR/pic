<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Memories Together 💖</title>
    <style>
        :root {
            --transition-speed: 0.9s;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            font-family: sans-serif;
            user-select: none;
            cursor: pointer;
        }

        .stage {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .bg-blur-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            transform: scale(1.1);
            filter: blur(20px) brightness(0.6);
            transition: background-image var(--transition-speed) ease-in-out;
            background-size: cover;
            background-position: center;
        }

        .photo-container {
            position: relative;
            z-index: 2;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        #main-photo {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            border-radius: 8px;
            opacity: 1;
            transition: transform var(--transition-speed), opacity var(--transition-speed);
        }

        .heart-particle {
            position: absolute;
            pointer-events: none;
            color: #ff4d6d;
            font-size: 2.5rem;
            z-index: 100;
            animation: floatUp 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
        }

        @keyframes floatUp {
            0% {
                transform: translate(-50%, -50%) scale(0.4);
                opacity: 1;
            }
            100% {
                transform: translate(var(--tx), var(--ty)) scale(var(--scale)) rotate(var(--rot));
                opacity: 0;
            }
        }

        /* --- 9 Completely Unique Custom Transitions --- */
        .t0 { opacity: 0 !important; transform: scale(1.4) rotate(-8deg) !important; }
        .t1 { opacity: 0 !important; transform: translateX(100vw) !important; }
        .t2 { opacity: 0 !important; transform: rotateY(90deg) !important; }
        .t3 { opacity: 0 !important; transform: scale(0.2) rotate(12deg) !important; }
        .t4 { opacity: 0 !important; transform: translateY(100vh) !important; }
        .t5 { opacity: 0 !important; transform: rotate(180deg) scale(0.4) !important; }
        .t6 { opacity: 0 !important; transform: scale(1.3, 0.7) translateY(-80px) !important; }
        .t7 { opacity: 0 !important; transform: translateX(-100vw) !important; }
        .t8 { opacity: 0 !important; transform: rotate(-360deg) scale(0.8) !important; }
    </style>
</head>
<body>

    <div class="stage" id="stage">
        <div class="bg-blur-container" id="bg-blur"></div>
        <div class="photo-container">
